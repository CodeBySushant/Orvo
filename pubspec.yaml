name: orvo
description: "Orvo — a premium offline music player."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  just_audio: ^0.9.42
  audio_service: ^0.18.15
  audio_session: ^0.1.23
  on_audio_query_pluse: ^3.0.7
  permission_handler: ^11.3.1
  palette_generator: ^0.3.3+5
  shared_preferences: ^2.3.3
  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
